# 一键跑：Security / Simple checks / Typo / Build
# 在任意 repo 的 .github/workflows/ 里放一份即可，或通过 reusable 调用本 workflow
name: Simple tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-analysis:
    name: Security Analysis
    uses: OpenClawHQ/.github/.github/workflows/security-analysis.yml@main

  simple-checks:
    name: Simple checks
    uses: OpenClawHQ/.github/.github/workflows/simple-checks.yml@main

  typo:
    name: Typo
    uses: OpenClawHQ/.github/.github/workflows/typo.yml@main

  build:
    name: Build
    uses: OpenClawHQ/.github/.github/workflows/build.yml@main
