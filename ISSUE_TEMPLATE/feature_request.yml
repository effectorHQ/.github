name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We're listening. Describe the problem you're solving, not just the solution you want.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "When I try to..., I currently have to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you'd approach solving it. Code sketches, API ideas, or rough designs are all welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why this one is better.
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big is this?
      options:
        - Small (single file / minor tweak)
        - Medium (new module or significant change)
        - Large (architecture change / new repo)
    validations:
      required: false
  - type: checkboxes
    id: willing
    attributes:
      label: Would you like to work on this?
      options:
        - label: I'm willing to submit a PR for this feature
